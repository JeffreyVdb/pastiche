services:
  db:
    image: public.ecr.aws/docker/library/postgres:18-alpine
    environment:
      POSTGRES_USER: pastiche
      POSTGRES_PASSWORD: pastiche
      POSTGRES_DB: pastiche
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastiche"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

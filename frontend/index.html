<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#282828" />
    <meta name="description" content="Code snippets manager" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Pastiche</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      #boot-spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #282828;
      }
      #boot-spinner-ring {
        width: 24px;
        height: 24px;
        border: 2px solid #504945;
        border-top-color: #8ec07c;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      #boot-error {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 100dvh;
        background: #282828;
        color: #ebdbb2;
        font-family: system-ui, sans-serif;
        font-size: 15px;
        text-align: center;
        padding: 24px;
      }
      #boot-error button {
        padding: 8px 20px;
        background: none;
        border: 1px solid #8ec07c;
        border-radius: 8px;
        color: #8ec07c;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-spinner"><div id="boot-spinner-ring"></div></div>
    </div>
    <div id="boot-error">
      <span>Pastiche couldn't load.</span>
      <button onclick="window.location.reload()">Reload</button>
    </div>
    <script>
      window.__bootError = false;
      window.addEventListener('error', function(e) {
        if (window.__bootError) return;
        var msg = (e.message || '').toLowerCase();
        if (msg.indexOf('import') !== -1 || msg.indexOf('fetch') !== -1 || msg.indexOf('loading') !== -1 || msg.indexOf('chunk') !== -1 || msg.indexOf('module') !== -1) {
          window.__bootError = true;
          document.getElementById('root').style.display = 'none';
          document.getElementById('boot-error').style.display = 'flex';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      }
    </script>
  </body>
</html>
